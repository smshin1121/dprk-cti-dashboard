  # -------------------------------------------------------------------------
  # dockerfile-digest-resolve — PR #49 (closes PR #48 security-reviewer R0 MED)
  #
  # The per-service `test_dockerfile_digest_pin.py` + FE
  # `dockerfile-digest-pin.test.ts` suites (added in PR #48) enforce the
  # FORMAT of every FROM line — they assert each carries `@sha256:<64-hex>`
  # but cannot validate that the digest actually exists in the upstream
  # registry. A contributor who typos a digest or copy-pastes from a
  # sibling image would pass the unit-test layer with a non-resolvable
  # reference. This job closes that gap.
  #
  # Walks every `Dockerfile` tracked by git, parses its `FROM` directives,
  # and runs `docker manifest inspect` against each fully-qualified
  # reference (image:tag@sha256:...). A typo'd digest fails with
  # "manifest unknown" / "no such manifest" — the job exits non-zero.
  #
  # The check is registry-roundtrip only (no `docker build`, no layer
  # download) so it stays fast (~5s) and adds no meaningful CI cost.
  # The `scratch` pseudo-image is excluded — it has no pullable manifest.
  # -------------------------------------------------------------------------
  dockerfile-digest-resolve:
    runs-on: ubuntu-latest
    permissions:
      # Least privilege: only `actions/checkout` needs `contents: read`;
      # `docker manifest inspect` against public registries is anonymous.
      # Folded in PR #53 alongside `gha-action-digest-resolve` for
      # cross-job consistency.
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Resolve every pinned digest against its registry
        run: |
          set -euo pipefail
          FAIL=0
          SCANNED=0

          # PR #55 — silent-pass class fix. Buffer extracted refs into a
          # temp file so the extractor's exit status is observable AND
          # set-e-safe. Process-substitution `done < <(...)` masks the
          # extractor's non-zero exit, which can leave a green CI tick on
          # a partial walk or a zero-walk. The original `done < <(grep ...)`
          # had no SCANNED counter at all, so a renamed/moved Dockerfile
          # tree silently passed.
          inputs="$(mktemp)"
          trap 'rm -f "$inputs"' EXIT

          # Defensive guard against a tracked Dockerfile path containing
          # a literal `:` — the `IFS=':' read -r dockerfile raw` split
          # below would mis-parse `path:line` if the path itself had a
          # colon. Refuse to scan rather than silently use the wrong ref
          # (R0 convergent finding fold, PR #55).
          if git ls-files -- '**/Dockerfile' 'Dockerfile' | grep -q ':'; then
            echo "FAIL: a tracked Dockerfile path contains ':' which conflicts"
            echo "with the grep -H output delimiter used downstream. Rename"
            echo "the file or extend this extractor to a NUL-delim format."
            echo "(silent-pass guard, PR #55)"
            exit 1
          fi

          # Plan §4 set-e-safe form #2: `set +e ... set -e` block around
          # the extractor pipeline so errexit doesn't abort before the
          # PIPESTATUS capture runs. `git ls-files` exit MUST be 0. We
          # do NOT check the `xargs|grep` tail's exit code — `grep` exit
          # 1 (no-match across all files) and the resulting `xargs` exit
          # 123 (GNU xargs propagates child non-zero as 123) are both
          # benign and caught downstream by the SCANNED guard. In the
          # CI threat model (git-checkout produces readable files for
          # every tracked path), grep only returns 0 (match) or 1
          # (no-match) — never 2 (error) — so the no-match branch leaves
          # $inputs empty → SCANNED=0 → fail-loud. A theoretical
          # "partial extractor failure" (mid-walk file becomes
          # unreadable, grep exits 2, xargs reports 123 even with
          # SCANNED > 0) is unreachable on a clean ubuntu-latest runner;
          # documented in plan §0.1 R0 fold rationale + Codex r-final
          # correction (R-final fold, PR #55).
          set +e
          git ls-files -z -- '**/Dockerfile' 'Dockerfile' \
            | xargs -0 -r grep -iIH '^[[:space:]]*FROM[[:space:]]' > "$inputs"
          ls_files_rc=${PIPESTATUS[0]:-0}
          set -e

          if [ "$ls_files_rc" -ne 0 ]; then
            echo "FAIL: git ls-files extractor exited $ls_files_rc (silent-pass guard, PR #55)"
            exit 1
          fi

          # Each input line: <dockerfile>:<raw FROM line> (grep -H output).
          # Use IFS=':' with read -r so the dockerfile path (LHS of the
          # first colon) and the raw FROM line (RHS, including any colons
          # like `registry:5000/image@sha256:...`) split correctly into
          # exactly 2 fields. The path-colon guard above ensures the LHS
          # never contains a colon.
          # `-i` on grep matches the sed `/I` flags below so a lowercase
          # `from` line (legal per the Dockerfile spec) is not silently skipped.
          while IFS=':' read -r dockerfile raw; do
            # Strip optional leading "--platform=..." flag(s) and trailing
            # "AS <stage>" suffix so what's left is the bare image ref.
            ref="$(printf '%s\n' "$raw" \
              | sed -E 's/^[[:space:]]+//' \
              | sed -E 's/^FROM[[:space:]]+//I' \
              | sed -E 's/^(--[^[:space:]]+[[:space:]]+)+//' \
              | sed -E 's/[[:space:]]+AS[[:space:]]+[A-Za-z0-9_-]+[[:space:]]*$//I' \
              | sed -E 's/[[:space:]]+$//')"
            if [ -z "$ref" ] || [ "$ref" = "scratch" ]; then
              continue
            fi
            SCANNED=$((SCANNED + 1))
            echo ">>> $dockerfile: $ref"
            if ! docker manifest inspect "$ref" >/dev/null 2>&1; then
              echo "FAIL: docker manifest inspect rejected $ref"
              FAIL=1
            fi
          done < "$inputs"

          if [ "$SCANNED" -eq 0 ]; then
            echo "FAIL: extracted zero pinned digest refs from Dockerfiles."
            echo "Either every Dockerfile legitimately stopped using a"
            echo "FROM directive (in which case delete this job) or the"
            echo "extractor walk is broken. (silent-pass guard, PR #55)"
            exit 1
          fi
          exit "$FAIL"

  # -------------------------------------------------------------------------
  # dockerfile-cosign-verify — PR #56 (signature gate; layer 3 of supply-chain)
  #
  # Third layer of pattern_two_layer_defense_for_addressable_refs ->
  # three-layer defense for addressable refs:
  #   layer 1: format gate   (test_dockerfile_digest_pin.py — pin is present)
  #   layer 2: existence     (dockerfile-digest-resolve   — registry resolves)
  #   layer 3: signature     (this job                    — publisher signed it)
  #
  # A typo'd / yanked digest is caught by layer 2; a LEGITIMATE-BUT-
  # MALICIOUSLY-REPLACED digest (publisher account compromise, registry
  # MITM, layer substitution) is what this layer catches via Sigstore
  # keyless verification (Fulcio cert chain + Rekor transparency log).
  #
  # ALLOWLIST: data/cosign/signed-images.yml. Phase 1 ships EMPTY because
  # none of the four unique FROM refs in this repo (node:22-alpine,
  # nginx:1.27-alpine, python:3.12-slim x3) currently carry Sigstore
  # signatures from their upstream Docker Hub Official Images publishers.
  # The job is a no-op on empty allowlist (SCANNED=0, exit 0) and
  # activates the moment an entry is added — NO CI YAML edit required.
  # SCOPE-LOCKED to Dockerfile FROM only; multi-surface rollout (compose
  # / GHA services: / GHA uses:) DEFERRED to PR #57+ per
  # pattern_signature_gate_scope_lock_per_phase.
  #
  # Anti-patterns explicitly forbidden (per plan §4.5; carried from PR #55):
  #   - process-substitution around cosign verify (masks exit)
  #   - bare exit-code capture under `set -euo pipefail` (unreachable)
  #   - tlog-bypass / insecure-registry flags (defeat Rekor / TLS)
  # The format-gate test asserts the negatives against this job body.
  # -------------------------------------------------------------------------
  dockerfile-cosign-verify:
    runs-on: ubuntu-latest
    permissions:
      # Least privilege: only `actions/checkout` needs `contents: read`;
      # `cosign verify` against public registries + public Rekor/Fulcio
      # is anonymous. No `id-token: write` (we are the VERIFIER, not the
      # signer; keyless verification reads the existing cert + tlog).
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2 (2026-05-07)
      - name: Ensure PyYAML available for allowlist parser
        # ubuntu-24.04 runner does not ship PyYAML in the system Python.
        # Pinned to PyPI version that matches the repo's services/api venv.
        run: python3 -m pip install --user 'PyYAML==6.0.3'
      - name: Verify cosign signatures for allowlisted Dockerfile FROM images
        run: |
          set -euo pipefail
          ALLOWLIST="data/cosign/signed-images.yml"
          if [ ! -f "$ALLOWLIST" ]; then
            echo "FAIL: allowlist file $ALLOWLIST not found"
            exit 1
          fi

          # Parse allowlist into a tab-separated temp file:
          #   image \t identity \t issuer \t identity_match \t tlog_mode
          # Uses the PR #55 `if !` guard pattern so a Python crash exit
          # propagates under `set -euo pipefail` (vs the silent-pass class
          # closed in PR #55). All schema validation lives here AND in the
          # format-gate test (defense in depth: the runner check catches
          # drift after a Renovate auto-bump, the test catches it at
          # PR-time).
          inputs="$(mktemp)"
          trap 'rm -f "$inputs"' EXIT
          if ! python3 - "$ALLOWLIST" "$inputs" <<'PY'
          import re
          import sys
          from pathlib import Path
          import yaml

          allowlist = Path(sys.argv[1])
          out = Path(sys.argv[2])
          cfg = yaml.safe_load(allowlist.read_text(encoding="utf-8")) or {}

          # Reconciliation against current Dockerfile FROM refs.
          # Codex r1 finding (2026-05-15): the verify loop without this
          # check accepts stale allowlist entries (image no longer used)
          # silently as green, and never alerts on a Dockerfile FROM that
          # is missing from the allowlist (unverified). Both cases break
          # plan §5 risk-row "Allowlist drift" intent. Stale entries fail
          # loud (the allowlist is the policy contract); unlisted FROMs
          # warn (matches plan D3 "warning not failure for unsigned long
          # tail").
          _FROM_RE = re.compile(
              r"^\s*FROM\s+(?:--\S+\s+)*(?P<ref>\S+)(?:\s+AS\s+\S+)?\s*$",
              re.IGNORECASE,
          )
          dockerfile_paths = sorted(
              set(Path(".").glob("**/Dockerfile")) | set(Path(".").glob("Dockerfile"))
          )
          dockerfile_refs = set()
          for df in dockerfile_paths:
              for line in df.read_text(encoding="utf-8").splitlines():
                  m = _FROM_RE.match(line)
                  if not m:
                      continue
                  ref = m.group("ref").strip()
                  if not ref or ref == "scratch":
                      continue
                  dockerfile_refs.add(ref)

          version = cfg.get("version")
          if version != 1:
              sys.stderr.write(
                  f"FAIL: unsupported allowlist version {version!r}; expected 1.\n"
              )
              sys.exit(1)

          entries = cfg.get("images")
          if entries is None:
              entries = []
          if not isinstance(entries, list):
              sys.stderr.write(
                  f"FAIL: `images` must be a list; got {type(entries).__name__}.\n"
              )
              sys.exit(1)

          # Control chars that would mis-split the downstream TSV reader.
          # Per R0 security-reviewer Finding 4: \n/\r in string fields can
          # split a single entry across two lines of the temp file.
          _BAD_CHARS = ("\t", "\n", "\r")

          with out.open("w", encoding="utf-8") as f:
              for idx, entry in enumerate(entries):
                  if not isinstance(entry, dict):
                      sys.stderr.write(
                          f"FAIL: images[{idx}] must be a mapping; got {type(entry).__name__}.\n"
                      )
                      sys.exit(1)
                  image = entry.get("image", "")
                  identity = entry.get("certificate_identity", "")
                  issuer = entry.get("certificate_oidc_issuer", "")
                  identity_match = entry.get("identity_match", "literal")
                  tlog_mode = entry.get("tlog_mode", "required")
                  annotations = entry.get("annotations") or {}
                  if not (image and identity and issuer):
                      sys.stderr.write(
                          f"FAIL: images[{idx}] is incomplete: {entry!r}\n"
                      )
                      sys.exit(1)
                  if identity_match not in ("literal", "regexp"):
                      sys.stderr.write(
                          f"FAIL: images[{idx}].identity_match must be "
                          f"'literal' or 'regexp'; got {identity_match!r}.\n"
                      )
                      sys.exit(1)
                  # Per R0 security-reviewer Finding 2: regexp identities
                  # must be anchored with ^...$ or Go's regexp.MatchString
                  # accepts substring matches, allowing identity spoofing.
                  if identity_match == "regexp" and not (
                      identity.startswith("^") and identity.endswith("$")
                  ):
                      sys.stderr.write(
                          f"FAIL: images[{idx}].certificate_identity is a "
                          f"regexp but is not anchored with ^...$. Substring "
                          f"matches allow identity spoofing.\n"
                      )
                      sys.exit(1)
                  if tlog_mode != "required":
                      sys.stderr.write(
                          f"FAIL: images[{idx}].tlog_mode must be 'required' "
                          f"(per plan §4.5 anti-pattern); got {tlog_mode!r}.\n"
                      )
                      sys.exit(1)
                  # Per R0 security-reviewer Finding 3: `annotations` is
                  # documented in the schema but the runner does not yet
                  # forward --annotations to cosign verify. Refuse-to-scan
                  # rather than silently skip the policy. Remove this branch
                  # together with adding --annotations passthrough.
                  if annotations:
                      sys.stderr.write(
                          f"FAIL: images[{idx}].annotations is non-empty "
                          f"({annotations!r}) but annotation enforcement is "
                          f"not yet wired into cosign verify. Implement "
                          f"--annotations passthrough OR remove the field.\n"
                      )
                      sys.exit(1)
                  for bad in _BAD_CHARS:
                      if bad in image or bad in identity or bad in issuer:
                          sys.stderr.write(
                              f"FAIL: images[{idx}] field contains a literal "
                              f"{bad!r}; refusing to scan rather than mis-split.\n"
                          )
                          sys.exit(1)
                  f.write(
                      f"{image}\t{identity}\t{issuer}\t{identity_match}\t{tlog_mode}\n"
                  )

          # Reconcile after schema validation so a malformed allowlist
          # fails on its own merits, not on a (potentially irrelevant)
          # reconciliation diff. The per-entry completeness check above
          # `sys.exit(1)`s on empty `image`, so empty strings cannot
          # reach this set comprehension. The previous `allowlist_refs.discard("")`
          # was dead code; removed per PR #60 LOW finding F4 (cycle 14
          # security-reviewer).
          allowlist_refs = {e.get("image", "") for e in entries if isinstance(e, dict)}

          # Stale allowlist entries (image not used in any current Dockerfile FROM)
          # fail loud — the allowlist is the policy contract; a stale entry means
          # the policy says "verify this" for an image we don't actually use.
          stale = sorted(allowlist_refs - dockerfile_refs)
          if stale:
              sys.stderr.write(
                  "FAIL: cosign allowlist contains entries not found in any "
                  "current Dockerfile FROM ref:\n"
              )
              for s in stale:
                  sys.stderr.write(f"  - {s}\n")
              sys.stderr.write(
                  "Remove the stale entry (the image is no longer used) or "
                  "update the Dockerfile FROM to the allowlisted digest.\n"
              )
              sys.exit(1)

          # Unverified Dockerfile FROM refs (in repo, not in allowlist) warn-not-fail
          # per plan D3 (long tail of unsigned-by-publisher community images).
          unlisted = sorted(dockerfile_refs - allowlist_refs)
          for u in unlisted:
              sys.stderr.write(
                  f"WARN: Dockerfile FROM {u!r} is not in the cosign allowlist; "
                  f"signature verification skipped (per plan D3 warn-not-fail policy).\n"
              )
          PY
          then
            echo "FAIL: failed to parse $ALLOWLIST"
            exit 1
          fi

          # Empty-allowlist no-op path: Phase 1 idles here today.
          # When upstream publishers adopt cosign and entries are added,
          # this path becomes unreachable and the verify loop runs.
          if [ ! -s "$inputs" ]; then
            echo "INFO: $ALLOWLIST is empty (Phase 1 scaffold; no FROM ref signed today)."
            echo "SCANNED=0 FAIL=0"
            exit 0
          fi

          # Non-empty path: per-entry cosign verify.
          # The `|| [ -n "$image" ]` guard handles a TSV that ends without a
          # trailing newline (R0 security-reviewer Finding 1) — without it,
          # `read` returns non-zero on the final partial line and the verify
          # loop silently skips that entry.
          SCANNED=0
          FAIL=0
          while IFS=$'\t' read -r image identity issuer identity_match _tlog_mode \
              || [ -n "$image" ]; do
            SCANNED=$((SCANNED + 1))
            echo ">>> verify $image (issuer=$issuer identity-match=$identity_match)"
            # Capture stderr to distinguish TUF/network errors (transient,
            # rerun-cures) from genuine signature rejections (publisher
            # change or compromise). Without this, the log says only
            # "FAIL: cosign verify rejected $image" for both classes.
            if [ "$identity_match" = "regexp" ]; then
              if ! cosign_err=$(cosign verify "$image" \
                  --certificate-identity-regexp "$identity" \
                  --certificate-oidc-issuer "$issuer" 2>&1 >/dev/null); then
                echo "FAIL: cosign verify rejected $image"
                printf '%s\n' "$cosign_err" | sed 's/^/  | /'
                FAIL=1
              fi
            else
              if ! cosign_err=$(cosign verify "$image" \
                  --certificate-identity "$identity" \
                  --certificate-oidc-issuer "$issuer" 2>&1 >/dev/null); then
                echo "FAIL: cosign verify rejected $image"
                printf '%s\n' "$cosign_err" | sed 's/^/  | /'
                FAIL=1
              fi
            fi
          done < "$inputs"
          echo "SCANNED=$SCANNED FAIL=$FAIL"
          exit "$FAIL"

  # -------------------------------------------------------------------------
  # compose-image-digest-resolve — PR #51
  #
  # Sibling to `dockerfile-digest-resolve` (PR #49). The per-service
  # `test_compose_image_digest_pin.py` enforces the FORMAT of every
  # `image:` line in `docker-compose*.yml` — `@sha256:<64-hex>` must be
  # present. This job closes the existence-gate: a typo'd or withdrawn
  # digest passes the static-source test but fails `docker manifest
  # inspect` here.
  #
  # Walks every `docker-compose*.yml` / `docker-compose*.yaml` tracked
  # by git, parses each top-level `image:` mapping, and runs
  # `docker manifest inspect` against the referenced image. A typo'd
  # digest fails with "manifest unknown" — the job exits non-zero.
  #
  # Cost: registry-roundtrip only (no `docker compose up`, no `docker
  # pull` of layer blobs) so ~5-10s wall-clock on a fresh runner.
  # The `scratch` pseudo-image is excluded — it has no pullable manifest.
  # -------------------------------------------------------------------------
  compose-image-digest-resolve:
    runs-on: ubuntu-latest
    permissions:
      # Least privilege: only `actions/checkout` needs `contents: read`;
      # `docker manifest inspect` against public registries is anonymous.
      # Folded in PR #53 alongside `gha-action-digest-resolve` for
      # cross-job consistency.
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Resolve every pinned compose-image digest against its registry
        run: |
          set -euo pipefail
          FAIL=0
          SCANNED=0

          # PR #55 — silent-pass class fix. Same idiom as the sibling
          # `dockerfile-digest-resolve`. Original `done < <(grep ...)`
          # masked extractor exit AND lacked a SCANNED counter, so a
          # renamed/moved compose-file tree silently passed.
          inputs="$(mktemp)"
          trap 'rm -f "$inputs"' EXIT

          # Defensive guard against a tracked compose-file path containing
          # a literal `:` — the `IFS=':' read -r` split below would
          # mis-parse `path:line` if the path itself had a colon. Refuse
          # to scan rather than silently use the wrong ref (R0 convergent
          # finding fold, PR #55).
          if git ls-files -- 'docker-compose*.yml' 'docker-compose*.yaml' | grep -q ':'; then
            echo "FAIL: a tracked compose-file path contains ':' which conflicts"
            echo "with the grep -H output delimiter used downstream. Rename"
            echo "the file or extend this extractor to a NUL-delim format."
            echo "(silent-pass guard, PR #55)"
            exit 1
          fi

          # Plan §4 set-e-safe form #2: explicit `set +e ... set -e`
          # block + PIPESTATUS capture. `git ls-files` exit MUST be 0.
          # We do NOT check the `xargs|grep` tail's exit code: `grep`
          # exit 1 (no-match) propagates as `xargs` exit 123, both
          # benign and caught downstream by the SCANNED guard. In the
          # CI threat model (git-checkout produces readable files for
          # every tracked path), grep only returns 0 (match) or 1
          # (no-match) — never 2 (error) — so the no-match branch leaves
          # $inputs empty → SCANNED=0 → fail-loud. A theoretical
          # "partial extractor failure" is unreachable on a clean
          # ubuntu-latest runner; documented in plan §0.1 R0 fold
          # rationale + Codex r-final correction (R-final fold, PR #55).
          set +e
          git ls-files -z -- 'docker-compose*.yml' 'docker-compose*.yaml' \
            | xargs -0 -r grep -EIH '^[[:space:]]+image:' > "$inputs"
          ls_files_rc=${PIPESTATUS[0]:-0}
          set -e

          if [ "$ls_files_rc" -ne 0 ]; then
            echo "FAIL: git ls-files extractor exited $ls_files_rc (silent-pass guard, PR #55)"
            exit 1
          fi

          # Each input line: <compose_file>:<raw image: line> (grep -H output).
          while IFS=':' read -r compose_file raw; do
            # Strip the leading `<whitespace>image:<whitespace>` and any
            # trailing whitespace so what's left is the bare image ref.
            ref="$(printf '%s\n' "$raw" \
              | sed -E 's/^[[:space:]]*image:[[:space:]]*//' \
              | sed -E 's/[[:space:]]+$//' \
              | sed -E 's/^["'\'']//; s/["'\'']$//')"
            if [ -z "$ref" ] || [ "$ref" = "scratch" ]; then
              continue
            fi
            SCANNED=$((SCANNED + 1))
            echo ">>> $compose_file: $ref"
            if ! docker manifest inspect "$ref" >/dev/null 2>&1; then
              echo "FAIL: docker manifest inspect rejected $ref"
              FAIL=1
            fi
          done < "$inputs"

          if [ "$SCANNED" -eq 0 ]; then
            echo "FAIL: extracted zero compose-image refs from docker-compose*.yml/yaml."
            echo "Either every compose file legitimately stopped declaring a"
            echo "top-level image: line (in which case delete this job) or"
            echo "the extractor walk is broken. (silent-pass guard, PR #55)"
            exit 1
          fi
          exit "$FAIL"

  # -------------------------------------------------------------------------
  # compose-cosign-verify — PR #57 (signature gate layer 3 for compose surface)
  #
  # Phase 2 of pattern_signature_gate_scope_lock_per_phase — extending the
  # three-layer defense to top-level `image:` refs in docker-compose*.yml:
  #   layer 1: format gate   (test_compose_image_digest_pin.py — pin is present)
  #   layer 2: existence     (compose-image-digest-resolve     — registry resolves)
  #   layer 3: signature     (this job                         — publisher signed it)
  #
  # SCOPE-LOCKED to docker-compose*.yml top-level `image:` refs only. NOT
  # Dockerfile FROM (covered by PR #56 dockerfile-cosign-verify), NOT GHA
  # services: (deferred to PR #58), NOT GHA uses: (deferred to PR #59).
  #
  # ALLOWLIST: data/cosign/signed-images-compose.yml (separate per-surface file;
  # see PR #57 plan D3 for the separate-vs-shared rationale). Phase 2 ships
  # EMPTY because none of the 7 image refs in docker-compose.yml currently
  # carry Sigstore signatures from their upstream publishers. The job idles
  # on empty allowlist (SCANNED=0, exit 0) and activates the moment an entry
  # is added — NO CI YAML edit required.
  #
  # Anti-patterns explicitly forbidden (per PR #57 plan §4.5; carry-forward
  # from PR #56 R0 + Codex r1):
  #   - process-substitution around cosign verify (masks exit)
  #   - bare exit-code capture under `set -euo pipefail` (unreachable)
  #   - tlog-bypass / sct-bypass / insecure-registry / http-registry /
  #     private-infrastructure flag passthrough
  # The format-gate test asserts the negatives against this job body.
  # -------------------------------------------------------------------------
  compose-cosign-verify:
    runs-on: ubuntu-latest
    permissions:
      # Least privilege: cosign verify against public Rekor/Fulcio is
      # anonymous. No id-token: write (verifier, not signer).
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2 (2026-05-07)
      - name: Ensure PyYAML available for allowlist parser
        # ubuntu-24.04 runner does not ship PyYAML in the system Python.
        # Pinned to match the repo's services/api venv.
        run: python3 -m pip install --user 'PyYAML==6.0.3'
      - name: Verify cosign signatures for allowlisted docker-compose image refs
        run: |
          set -euo pipefail
          ALLOWLIST="data/cosign/signed-images-compose.yml"
          if [ ! -f "$ALLOWLIST" ]; then
            echo "FAIL: allowlist file $ALLOWLIST not found"
            exit 1
          fi

          # Parse allowlist + reconcile against current docker-compose*.yml
          # `services.<svc>.image:` refs in a single Python pass. Same idiom
          # as PR #56 dockerfile-cosign-verify (if-bang guard around the
          # heredoc parser; PR #55 silent-pass class fix carried forward).
          inputs="$(mktemp)"
          trap 'rm -f "$inputs"' EXIT
          if ! python3 - "$ALLOWLIST" "$inputs" <<'PY'
          import sys
          from pathlib import Path
          import yaml

          allowlist = Path(sys.argv[1])
          out = Path(sys.argv[2])
          cfg = yaml.safe_load(allowlist.read_text(encoding="utf-8")) or {}

          version = cfg.get("version")
          if version != 1:
              sys.stderr.write(
                  f"FAIL: unsupported allowlist version {version!r}; expected 1.\n"
              )
              sys.exit(1)

          entries = cfg.get("images")
          if entries is None:
              entries = []
          if not isinstance(entries, list):
              sys.stderr.write(
                  f"FAIL: `images` must be a list; got {type(entries).__name__}.\n"
              )
              sys.exit(1)

          # Reconciliation against current compose image refs.
          # Walk every docker-compose*.yml / .yaml via PyYAML safe_load
          # and extract every top-level services.<svc>.image: value.
          # Same shape as the compose-image-digest-resolve job's extractor
          # (grep-based) but PyYAML walk avoids false-positive matches.
          compose_paths = sorted(
              set(Path(".").glob("docker-compose*.yml"))
              | set(Path(".").glob("docker-compose*.yaml"))
              | set(Path(".").glob("**/docker-compose*.yml"))
              | set(Path(".").glob("**/docker-compose*.yaml"))
          )
          compose_refs = set()
          for cf in compose_paths:
              data = yaml.safe_load(cf.read_text(encoding="utf-8")) or {}
              services = data.get("services") or {}
              if not isinstance(services, dict):
                  continue
              for svc_name, svc in services.items():
                  if not isinstance(svc, dict):
                      continue
                  img = svc.get("image")
                  if isinstance(img, str) and img.strip():
                      compose_refs.add(img.strip())

          # Control chars that would mis-split the downstream TSV reader
          # (carry-forward from PR #56 R0 security-reviewer Finding 4).
          _BAD_CHARS = ("\t", "\n", "\r")

          with out.open("w", encoding="utf-8") as f:
              for idx, entry in enumerate(entries):
                  if not isinstance(entry, dict):
                      sys.stderr.write(
                          f"FAIL: images[{idx}] must be a mapping; got {type(entry).__name__}.\n"
                      )
                      sys.exit(1)
                  image = entry.get("image", "")
                  identity = entry.get("certificate_identity", "")
                  issuer = entry.get("certificate_oidc_issuer", "")
                  identity_match = entry.get("identity_match", "literal")
                  tlog_mode = entry.get("tlog_mode", "required")
                  # Use explicit `in (None, {})` (NOT `or {}`) so a falsy
                  # non-dict annotations value (False / 0 / "") is REJECTED
                  # rather than silently normalized to {}. Mirrors the
                  # format-gate test's predicate verbatim — R0 security-
                  # reviewer Finding 4 (defense-in-depth runner/test parity).
                  annotations = entry.get("annotations")
                  if not (image and identity and issuer):
                      sys.stderr.write(
                          f"FAIL: images[{idx}] is incomplete: {entry!r}\n"
                      )
                      sys.exit(1)
                  if identity_match not in ("literal", "regexp"):
                      sys.stderr.write(
                          f"FAIL: images[{idx}].identity_match must be "
                          f"'literal' or 'regexp'; got {identity_match!r}.\n"
                      )
                      sys.exit(1)
                  # Regexp identities MUST be anchored ^...$ (carry-forward
                  # from PR #56 R0 security-reviewer Finding 2).
                  if identity_match == "regexp" and not (
                      identity.startswith("^") and identity.endswith("$")
                  ):
                      sys.stderr.write(
                          f"FAIL: images[{idx}].certificate_identity is a "
                          f"regexp but is not anchored with ^...$. Substring "
                          f"matches allow identity spoofing.\n"
                      )
                      sys.exit(1)
                  if tlog_mode != "required":
                      sys.stderr.write(
                          f"FAIL: images[{idx}].tlog_mode must be 'required' "
                          f"(plan §4.5 anti-pattern); got {tlog_mode!r}.\n"
                      )
                      sys.exit(1)
                  # Annotations forwarding not yet wired into cosign verify;
                  # refuse-to-scan beats silent-skip. Strict equality check
                  # (NOT truthy) so a malformed annotations: false / 0 / ""
                  # is REJECTED rather than silently normalized — mirrors
                  # the format-gate test predicate. R0 security-reviewer
                  # Finding 4 carry-forward + PR #57 R0 strict-parity fold.
                  if annotations not in (None, {}):
                      sys.stderr.write(
                          f"FAIL: images[{idx}].annotations must be {{}} or "
                          f"absent (Phase 2 — runner does not yet forward "
                          f"--annotations to cosign verify); got "
                          f"{annotations!r}. Implement --annotations passthrough "
                          f"OR remove / empty the field.\n"
                      )
                      sys.exit(1)
                  for bad in _BAD_CHARS:
                      if bad in image or bad in identity or bad in issuer:
                          sys.stderr.write(
                              f"FAIL: images[{idx}] field contains a literal "
                              f"{bad!r}; refusing to scan rather than mis-split.\n"
                          )
                          sys.exit(1)
                  f.write(
                      f"{image}\t{identity}\t{issuer}\t{identity_match}\t{tlog_mode}\n"
                  )

          # Reconcile after schema validation (mirror PR #56's order):
          # stale allowlist entries (in allowlist but not in any current
          # compose `image:` ref) fail loud; unlisted compose refs (current
          # ref but no allowlist entry) warn (plan D3 long-tail policy).
          # Per-entry completeness check above `sys.exit(1)`s on empty
          # `image`, so the previous `allowlist_refs.discard("")` was
          # dead code (removed per PR #60 LOW finding F4).
          allowlist_refs = {e.get("image", "") for e in entries if isinstance(e, dict)}
          stale = sorted(allowlist_refs - compose_refs)
          if stale:
              sys.stderr.write(
                  "FAIL: cosign compose allowlist contains entries not found in any "
                  "current docker-compose `image:` ref:\n"
              )
              for s in stale:
                  sys.stderr.write(f"  - {s}\n")
              sys.stderr.write(
                  "Remove the stale entry (the image is no longer used) or "
                  "update docker-compose.yml to the allowlisted digest.\n"
              )
              sys.exit(1)
          unlisted = sorted(compose_refs - allowlist_refs)
          for u in unlisted:
              sys.stderr.write(
                  f"WARN: docker-compose `image:` {u!r} is not in the cosign "
                  f"compose allowlist; signature verification skipped (plan "
                  f"D3 warn-not-fail policy).\n"
              )
          PY
          then
            echo "FAIL: failed to parse $ALLOWLIST"
            exit 1
          fi

          # Empty-allowlist no-op path (Phase 2 idle today).
          if [ ! -s "$inputs" ]; then
            echo "INFO: $ALLOWLIST is empty (Phase 2 scaffold; no compose image signed today)."
            echo "SCANNED=0 FAIL=0"
            exit 0
          fi

          # Non-empty path: per-entry cosign verify.
          # The `|| [ -n "$image" ]` guard handles a TSV with no trailing
          # newline (PR #56 R0 security-reviewer Finding 1).
          SCANNED=0
          FAIL=0
          while IFS=$'\t' read -r image identity issuer identity_match _tlog_mode \
              || [ -n "$image" ]; do
            SCANNED=$((SCANNED + 1))
            echo ">>> verify $image (issuer=$issuer identity-match=$identity_match)"
            # Capture stderr to distinguish TUF/network errors from genuine
            # signature rejections (PR #56 R0 code-reviewer Finding 5).
            if [ "$identity_match" = "regexp" ]; then
              if ! cosign_err=$(cosign verify "$image" \
                  --certificate-identity-regexp "$identity" \
                  --certificate-oidc-issuer "$issuer" 2>&1 >/dev/null); then
                echo "FAIL: cosign verify rejected $image"
                printf '%s\n' "$cosign_err" | sed 's/^/  | /'
                FAIL=1
              fi
            else
              if ! cosign_err=$(cosign verify "$image" \
                  --certificate-identity "$identity" \
                  --certificate-oidc-issuer "$issuer" 2>&1 >/dev/null); then
                echo "FAIL: cosign verify rejected $image"
                printf '%s\n' "$cosign_err" | sed 's/^/  | /'
                FAIL=1
              fi
            fi
          done < "$inputs"
          echo "SCANNED=$SCANNED FAIL=$FAIL"
          exit "$FAIL"

  # -------------------------------------------------------------------------
  # gha-services-image-digest-resolve — supply-chain hardening sweep follow-up
  #
  # Sibling to `dockerfile-digest-resolve` (PR #49) and
  # `compose-image-digest-resolve` (PR #51). The new
  # `test_gha_services_image_digest_pin.py` enforces the FORMAT of every
  # `image:` line under a `services:` block in `.github/workflows/*.yml`
  # — `@sha256:<64-hex>` must be present. This job closes the existence
  # gate: a typo'd or withdrawn digest passes the static-source test but
  # fails `docker manifest inspect` here.
  #
  # YAML-walk extraction (vs the sibling jobs' pure-grep) because
  # `image:` can appear at three places in a workflow YAML —
  # `jobs.<job>.services.<svc>.image` (in scope), `jobs.<job>.container.image`
  # (out of scope today, would extend trivially), and inside step
  # `with:` blocks for actions like `docker/build-push-action` (false
  # positive). Walking the YAML structurally avoids false positives and
  # makes future additions explicit.
  #
  # Cost: registry-roundtrip only (no `docker compose up`, no
  # `docker pull` of layer blobs) so ~5-10s wall-clock on a fresh
  # runner. The `scratch` pseudo-image is excluded — it has no pullable
  # manifest.
  #
  # Fail-loud guard: if the YAML walk returns zero refs (e.g. someone
  # deletes the last `services:` block, or the walk regex breaks), the
  # job exits non-zero with a "delete this job or fix the walk" hint
  # instead of silently passing.
  # -------------------------------------------------------------------------
  gha-services-image-digest-resolve:
    runs-on: ubuntu-latest
    permissions:
      # Least privilege: only `actions/checkout` needs `contents: read`;
      # `docker manifest inspect` against public registries is anonymous.
      # Folded in PR #53 alongside `gha-action-digest-resolve` for
      # cross-job consistency.
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - name: Install PyYAML
        # Version-pinned to match the project's transitive PyYAML pin
        # in services/api/uv.lock (6.0.3) so a CI gate dependency does
        # not silently drift independently of the application services.
        run: pip install "pyyaml==6.0.3"
      - name: Resolve every pinned GHA services image digest against its registry
        run: |
          set -euo pipefail
          FAIL=0
          SCANNED=0

          # PR #55 — silent-pass class fix. Buffer Python extractor output
          # into a temp file so the extractor's exit status is observable
          # AND set-e-safe. Process-substitution `done < <(python3 ...)`
          # masked Python's exit code: a crash mid-walk with N rows already
          # emitted leaves SCANNED=N>0 and a green tick on a partial scan.
          inputs="$(mktemp)"
          trap 'rm -f "$inputs"' EXIT

          # Plan §4 set-e-safe form #1: `if !` guard around the Python
          # heredoc. errexit does NOT abort the if-condition on failure,
          # so the fail-loud branch always runs.
          if ! python3 - <<'PY' > "$inputs"
          from pathlib import Path
          import yaml
          workflows = sorted(Path('.github/workflows').glob('*.yml')) + sorted(
              Path('.github/workflows').glob('*.yaml')
          )
          for wf in workflows:
              data = yaml.safe_load(wf.read_text(encoding='utf-8')) or {}
              for job_id, job in (data.get('jobs') or {}).items():
                  if not isinstance(job, dict):
                      continue
                  services = job.get('services') or {}
                  if not isinstance(services, dict):
                      continue
                  for svc_name, svc in services.items():
                      if not isinstance(svc, dict):
                          continue
                      img = svc.get('image')
                      if isinstance(img, str) and img.strip():
                          print(f"{wf.name} {job_id} {svc_name} {img.strip()}")
          PY
          then
            echo "FAIL: Python extractor exited non-zero (silent-pass guard, PR #55)"
            exit 1
          fi

          while IFS=' ' read -r workflow job_id svc_name ref; do
            if [ -z "$ref" ] || [ "$ref" = "scratch" ]; then
              continue
            fi
            SCANNED=$((SCANNED + 1))
            echo ">>> $workflow ($job_id/$svc_name): $ref"
            if ! docker manifest inspect "$ref" >/dev/null 2>&1; then
              echo "FAIL: docker manifest inspect rejected $ref"
              FAIL=1
            fi
          done < "$inputs"

          if [ "$SCANNED" -eq 0 ]; then
            echo "FAIL: extracted zero services-image refs from .github/workflows/."
            echo "Either every workflow legitimately stopped using a services: block"
            echo "(in which case delete this job) or the YAML walk is broken."
            exit 1
          fi
          exit "$FAIL"

  # -------------------------------------------------------------------------
  # gha-action-digest-resolve — supply-chain hardening sweep follow-up
  #
  # Sibling to `dockerfile-digest-resolve` (PR #49),
  # `compose-image-digest-resolve` (PR #51), and
  # `gha-services-image-digest-resolve` (PR #52). The new
  # `test_gha_action_digest_pin.py` enforces the FORMAT of every
  # `uses:` ref in `.github/workflows/*.yml` — a 40-char lowercase-hex
  # commit SHA must be present after `@`. This job closes the
  # existence gate: a typo'd or yanked SHA passes the static-source
  # test but fails `gh api repos/<owner>/<repo>/commits/<sha>` here.
  #
  # Why action-tag digest pinning matters: a third-party action owner
  # can re-point a mutable tag (`@v5`, `@main`) to malicious code at
  # any time. The tj-actions/changed-files compromise (CVE-2025-30066,
  # March 2025) demonstrated the concrete attack surface — repos
  # pinning to `@v45` had their secrets exfiltrated when the v45 tag
  # was force-pushed to a malicious commit. Pinning to a 40-hex
  # commit SHA freezes the action's code at a point-in-time review.
  #
  # YAML-walk extraction (vs the sibling jobs' pure-grep) because
  # `uses:` can appear at three places in a workflow YAML —
  # `jobs.<job>.steps[*].uses` (in scope), `jobs.<job>.uses` (in
  # scope, reusable workflow at job level — none today), and inside
  # `with:` parameter values for some composite actions (false
  # positive). Walking structurally avoids false positives.
  #
  # Cost: GitHub API roundtrip via `gh api` against the authenticated
  # GITHUB_TOKEN. Each ref takes ~50-200ms; with dedupe across the
  # 44 step-level refs in this repo today that's ~6 unique calls,
  # ~3-5s total. Rate-limit pressure: 1000 req/h authenticated, so
  # this job consumes <1% of the budget per run.
  #
  # Fail-loud guard: if the YAML walk returns zero refs, the job
  # exits non-zero with a "delete this job or fix the walk" hint
  # instead of silently passing. The dedup also implicitly guards
  # against a logic bug that emits the same (action,sha) pair
  # repeatedly without checking actual ref count.
  # -------------------------------------------------------------------------
  gha-action-digest-resolve:
    runs-on: ubuntu-latest
    permissions:
      # `gh api repos/<owner>/<repo>/commits/<sha>` against public
      # repos requires only `contents:read`. Explicit grant keeps
      # the job on the principle of least privilege rather than
      # inheriting the workflow-level default.
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - name: Install PyYAML
        # Version-pinned to match the project's transitive PyYAML pin
        # in services/api/uv.lock (6.0.3) so a CI gate dependency does
        # not silently drift independently of the application services.
        # Same convention as gha-services-image-digest-resolve.
        run: pip install "pyyaml==6.0.3"
      - name: Resolve every pinned GHA action commit SHA against GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          FAIL=0
          SCANNED=0

          # PR #55 — silent-pass class fix. Buffer the Python+sort pipeline
          # output into a temp file so the extractor's exit status is
          # observable AND set-e-safe. Process-substitution
          # `done < <(python3 ... | sort -u)` masked Python's exit (sort
          # would still exit 0 for the rows it received). With pipefail
          # already set, the `if !` guard catches a non-zero in any
          # pipeline element — including a Python crash mid-walk.
          inputs="$(mktemp)"
          trap 'rm -f "$inputs"' EXIT

          # Plan §4 set-e-safe form #1 with pipeline: `if !` around the
          # full `python3 ... | sort -u > "$inputs"` pipeline. `set -o
          # pipefail` (already set above) makes the pipeline's effective
          # exit reflect any non-zero element, so a Python crash trips
          # the if-true branch reliably.
          # Dedupe on (action, sha) tuple via sort -u — many workflows
          # repeat the same `actions/checkout@<sha>` across jobs; one
          # API call covers the whole repo.
          if ! python3 - <<'PY' | sort -u > "$inputs"
          import re
          from pathlib import Path
          import yaml
          SHA_RE = re.compile(r"^[0-9a-f]{40}$")
          def split_uses(value: str):
              v = (value or "").strip()
              if not v or v.startswith("./") or v.startswith("../") or v.startswith("docker://") or "@" not in v:
                  return None
              action, _, ref = v.rpartition("@")
              return action, ref
          workflows = sorted(Path('.github/workflows').glob('*.yml')) + sorted(
              Path('.github/workflows').glob('*.yaml')
          )
          for wf in workflows:
              data = yaml.safe_load(wf.read_text(encoding='utf-8')) or {}
              for job_id, job in (data.get('jobs') or {}).items():
                  if not isinstance(job, dict):
                      continue
                  job_uses = job.get('uses')
                  if isinstance(job_uses, str):
                      r = split_uses(job_uses)
                      if r and SHA_RE.match(r[1]):
                          print(f"{r[0]} {r[1]}")
                  for step in (job.get('steps') or []):
                      if not isinstance(step, dict):
                          continue
                      step_uses = step.get('uses')
                      if not isinstance(step_uses, str):
                          continue
                      r = split_uses(step_uses)
                      if r and SHA_RE.match(r[1]):
                          print(f"{r[0]} {r[1]}")
          PY
          then
            echo "FAIL: Python | sort -u extractor pipeline exited non-zero (silent-pass guard, PR #55)"
            exit 1
          fi

          while IFS=' ' read -r action sha; do
            if [ -z "$action" ] || [ -z "$sha" ]; then
              continue
            fi
            SCANNED=$((SCANNED + 1))
            echo ">>> $action @ $sha"
            if ! gh api "repos/$action/commits/$sha" --jq '.sha' >/dev/null 2>&1; then
              echo "FAIL: gh api repos/$action/commits/$sha rejected the SHA"
              FAIL=1
            fi
          done < "$inputs"

          if [ "$SCANNED" -eq 0 ]; then
            echo "FAIL: extracted zero pinned action refs from .github/workflows/."
            echo "Either every workflow legitimately stopped using third-party"
            echo "actions (in which case delete this job) or the format-gate test"
            echo "is suppressing refs the existence gate should also see."
            exit 1
          fi
          exit "$FAIL"

  # -------------------------------------------------------------------------
  # Existence gate for renovate.json (paired with services/api/tests/unit/
  # test_renovate_config.py per pattern_two_layer_defense_for_addressable_refs).
  # Runs the official renovate-config-validator on every push that touches
  # renovate.json so a broken config surfaces immediately rather than waiting
  # until the next scheduled Sunday renovate run. Sibling to gha-action-
  # digest-resolve / gha-services-image-digest-resolve / compose-image-digest-
  # resolve / dockerfile-digest-resolve.
  # -------------------------------------------------------------------------
  renovate-config-resolve:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      # Note: deliberately skip actions/setup-node here. Setup-node@v5 auto-
      # detects `packageManager: pnpm@...` in the repo's apps/frontend/
      # package.json and tries to enable corepack for cache restoration,
      # which fails because pnpm is not pre-installed on ubuntu-latest. The
      # ubuntu-latest runner image already includes Node 20 + npm/npx by
      # default; that is sufficient for npx-only invocation.
      - name: Validate renovate.json
        # Major-version-pinned to renovate@43 (current line at adoption time);
        # validator API is stable across renovate majors. A pyyaml-style hash
        # pin via npm-shrinkwrap is the deferred renovate-adoption follow-up.
        run: npx --yes --package renovate@43 -- renovate-config-validator renovate.json
