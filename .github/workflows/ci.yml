name: ci

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm --dir apps/frontend build

  python-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, worker, llm-proxy]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --project services/${{ matrix.service }} --no-install-project
      - run: uv run --project services/${{ matrix.service }} python -c "print('ok')"

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Sync api dev dependencies
        working-directory: services/api
        run: uv sync
      - name: Run pytest with coverage gate
        working-directory: services/api
        run: |
          uv run pytest \
            --cov=src/api \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-xml
          path: services/api/coverage.xml
          if-no-files-found: warn

  worker-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Sync worker dev dependencies
        working-directory: services/worker
        run: uv sync
      - name: Run pytest with coverage gate
        working-directory: services/worker
        run: |
          uv run pytest \
            --cov=src/worker/bootstrap \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70
      - name: Verify Bootstrap ETL fixture matches YAML source
        # Regenerate the fixture workbook to a temporary path and
        # semantic-diff every cell against the committed xlsx. This
        # catches the case where someone edits bootstrap_sample.yaml
        # but forgets to commit the rebuilt workbook. openpyxl's
        # xlsx output is not byte-stable across runs (zip entry
        # metadata drifts), so git diff is not a reliable check;
        # the loader-based cell-by-cell comparison is.
        working-directory: services/worker
        run: |
          mkdir -p "${RUNNER_TEMP}/fixture-check"
          REGEN_PATH="${RUNNER_TEMP}/fixture-check/bootstrap_sample.xlsx"
          uv run python ../../scripts/generate_bootstrap_fixture.py --output "$REGEN_PATH"
          uv run python -c "
          from openpyxl import load_workbook
          committed = load_workbook('tests/fixtures/bootstrap_sample.xlsx', data_only=True)
          regenerated = load_workbook('$REGEN_PATH', data_only=True)
          assert committed.sheetnames == regenerated.sheetnames, (
              f'sheet list drift: {committed.sheetnames} vs {regenerated.sheetnames}'
          )
          for sheet in committed.sheetnames:
              c_rows = [tuple(cell.value for cell in row) for row in committed[sheet].iter_rows()]
              r_rows = [tuple(cell.value for cell in row) for row in regenerated[sheet].iter_rows()]
              assert c_rows == r_rows, (
                  f'sheet {sheet!r} cell drift: committed vs regenerated differ. '
                  f'Edit services/worker/tests/fixtures/bootstrap_sample.yaml and '
                  f'rerun scripts/generate_bootstrap_fixture.py to commit the new xlsx.'
              )
          print('fixture drift check: OK')
          "
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: worker-coverage-xml
          path: services/worker/coverage.xml
          if-no-files-found: warn

  db-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: dprk_cti_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Install alembic deps from services/api
        run: uv sync --project services/api --no-install-project
      - name: Run alembic upgrade head
        env:
          ALEMBIC_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/dprk_cti_test
        run: uv run --project services/api alembic -c db/alembic.ini upgrade head
      - name: Verify pgvector and pg_trgm extensions
        run: |
          uv run --project services/api python -c "
          import psycopg
          c = psycopg.connect('postgresql://postgres:postgres@localhost:5432/dprk_cti_test')
          cur = c.cursor()
          cur.execute('SELECT extname FROM pg_extension WHERE extname IN (%s, %s) ORDER BY extname', ('pg_trgm', 'vector'))
          rows = cur.fetchall()
          assert rows == [('pg_trgm',), ('vector',)], f'Missing extensions: {rows}'
          print('extensions ok:', rows)
          "
      - name: Verify staging table exists
        run: |
          uv run --project services/api python -c "
          import psycopg
          c = psycopg.connect('postgresql://postgres:postgres@localhost:5432/dprk_cti_test')
          cur = c.cursor()
          cur.execute(\"SELECT table_name FROM information_schema.tables WHERE table_schema='public' AND table_name='staging'\")
          assert cur.fetchone() is not None, 'staging table missing'
          print('staging table ok')
          "
      - name: Verify dq_events table exists
        run: |
          uv run --project services/api python -c "
          import psycopg
          c = psycopg.connect('postgresql://postgres:postgres@localhost:5432/dprk_cti_test')
          cur = c.cursor()
          cur.execute(\"SELECT table_name FROM information_schema.tables WHERE table_schema='public' AND table_name='dq_events'\")
          assert cur.fetchone() is not None, 'dq_events table missing'
          cur.execute(\"SELECT conname FROM pg_constraint WHERE conrelid='dq_events'::regclass AND contype='c'\")
          check_names = {row[0] for row in cur.fetchall()}
          assert 'ck_dq_events_severity_allowed' in check_names, f'severity CHECK constraint missing: {check_names}'
          print('dq_events table ok')
          "
      - name: Verify downgrade/upgrade reversibility
        env:
          ALEMBIC_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/dprk_cti_test
        run: |
          uv run --project services/api alembic -c db/alembic.ini downgrade -1
          uv run --project services/api alembic -c db/alembic.ini upgrade head
