name: ci

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 9.15.9
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install
      # PR #12 Group I: run unit + contract tests alongside the build
      # so a regression in vitest OR pact consumer flips the job red
      # before it reaches reviewer CI tabs.
      - run: pnpm --dir apps/frontend test
      - run: pnpm --dir apps/frontend test:contract
      - run: pnpm --dir apps/frontend build

  # -------------------------------------------------------------------------
  # frontend-e2e — PR #12 Phase 2.3 Group I / D9
  #
  # Single Playwright journey: login-seeded shell → /dashboard KPI
  # strip renders → navigate /actors list renders ≥1 row.
  #
  # Uses the same dev-only POST /_pact/provider_states endpoint that
  # contract-verify uses, so FE fixture seeding stays drift-free with
  # the BE harness. Keycloak is bypassed entirely (dev realm has
  # directAccessGrantsEnabled=false — memory
  # `pattern_forged_cookie_verification.md`).
  # -------------------------------------------------------------------------
  frontend-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: dprk_cti_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ALEMBIC_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/dprk_cti_e2e
      DATABASE_URL: postgresql+psycopg_async://postgres:postgres@localhost:5432/dprk_cti_e2e
      REDIS_URL: redis://localhost:6379/0
      RATE_LIMIT_STORAGE_URL: redis://localhost:6379/1
      APP_ENV: dev
      OIDC_CLIENT_ID: dprk-cti
      OIDC_CLIENT_SECRET: e2e-oidc-secret
      OIDC_ISSUER_URL: http://keycloak.test/realms/dprk
      OIDC_REDIRECT_BASE_URL: http://localhost:8000
      SESSION_SIGNING_KEY: e2e-signing-key-at-least-32-chars-long
      SESSION_COOKIE_NAME: dprk_cti_session
      SESSION_COOKIE_SECURE: "false"
      SESSION_COOKIE_SAMESITE: lax
      CORS_ORIGINS: http://127.0.0.1:4173
      E2E_BASE_URL: http://127.0.0.1:4173
      E2E_API_BASE_URL: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 9.15.9
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pnpm install
      - name: Sync api dev dependencies
        working-directory: services/api
        run: uv sync
      - name: Alembic upgrade
        run: uv run --project services/api alembic -c db/alembic.ini upgrade head
      - name: Build FE for preview
        working-directory: apps/frontend
        env:
          # FE calls BE at the same origin under nginx in prod; for
          # E2E we set the VITE build-time API base so the preview
          # bundle talks to the uvicorn we're about to boot.
          VITE_API_URL: http://127.0.0.1:8000
        run: pnpm build
      - name: Install Playwright browsers
        working-directory: apps/frontend
        run: pnpm exec playwright install --with-deps chromium
      - name: Start uvicorn
        working-directory: services/api
        run: |
          uv run uvicorn api.main:app --host 127.0.0.1 --port 8000 \
            --log-level warning > ../../uvicorn.log 2>&1 &
          echo $! > ../../uvicorn.pid
      - name: Start FE preview server
        working-directory: apps/frontend
        run: |
          pnpm preview --host 127.0.0.1 --port 4173 > ../../preview.log 2>&1 &
          echo $! > ../../preview.pid
      - name: Wait for BE /healthz
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:8000/healthz >/dev/null 2>&1; then
              exit 0
            fi
            sleep 0.5
          done
          echo "uvicorn did not come up"
          cat uvicorn.log || true
          exit 1
      - name: Wait for FE preview
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:4173/ >/dev/null 2>&1; then
              exit 0
            fi
            sleep 0.5
          done
          echo "FE preview did not come up"
          cat preview.log || true
          exit 1
      - name: Run Playwright journey
        working-directory: apps/frontend
        run: pnpm test:e2e
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            apps/frontend/playwright-report
            apps/frontend/test-results
          if-no-files-found: warn
      - name: Surface server logs on failure
        if: failure()
        run: |
          echo "=== uvicorn.log ==="
          cat uvicorn.log || echo "(no log)"
          echo "=== preview.log ==="
          cat preview.log || echo "(no log)"
      - name: Stop background processes
        if: always()
        run: |
          for f in uvicorn.pid preview.pid; do
            if [ -f "$f" ]; then
              kill "$(cat "$f")" 2>/dev/null || true
            fi
          done

  python-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, worker, llm-proxy]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --project services/${{ matrix.service }} --no-install-project
      - run: uv run --project services/${{ matrix.service }} python -c "print('ok')"

  # -------------------------------------------------------------------------
  # api-tests — PR #11 + Group D extensions (PR #19a scope=a)
  #
  # PR #19a Group D: the api side of the embed-on-ingest wiring
  # (services/api/src/api/embedding_client.py,
  # services/api/src/api/embedding_writer.py,
  # services/api/tests/unit/test_embedding_client.py,
  # services/api/tests/unit/test_embedding_writer.py,
  # services/api/tests/integration/test_review_embedding.py)
  # is picked up by auto-discovery under ``testpaths`` with NO CI
  # command change. New modules reach 100% coverage; total api
  # coverage stays above the 70% gate.
  # -------------------------------------------------------------------------
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Sync api dev dependencies
        working-directory: services/api
        run: uv sync
      - name: Run pytest with coverage gate
        working-directory: services/api
        run: |
          # tests/contract is covered by the dedicated contract-verify
          # job (which boots pg+redis+uvicorn). Running them here too
          # would fire the PACT_PROVIDER_BASE_URL fail-loud test
          # against an unset env (plan D7 design) and red this job.
          uv run pytest \
            --ignore=tests/contract \
            --cov=src/api \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: api-coverage-xml
          path: services/api/coverage.xml
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # worker-tests — PR #6 + Group D extensions
  #
  # PR #19a Group D: NO command change required to pick up the new
  # embed-on-ingest + backfill test surface. All five new test files
  # (test_embedding_client.py, test_embedding_writer.py,
  # test_bootstrap_embedding.py, test_backfill.py, test_backfill_cli.py)
  # live under ``services/worker/tests/{unit,integration}/`` and are
  # auto-discovered via ``testpaths = ["tests"]`` in
  # services/worker/pyproject.toml. The ``--cov=src/worker/bootstrap``
  # flag already covers the three new production modules
  # (embedding_client.py, embedding_writer.py, backfill.py). Local run
  # measured bootstrap coverage at 96% (70% gate preserved with 26%
  # headroom).
  #
  # Signal separation is preserved: the ``python-services (worker)``
  # matrix step stays a pure import-tree smoke (``uv sync + print('ok')``)
  # that fires red on a broken dep graph BEFORE pytest gets a chance,
  # which is a different signal from broken test logic.
  # -------------------------------------------------------------------------
  worker-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Sync worker dev dependencies
        working-directory: services/worker
        run: uv sync
      - name: Run pytest with coverage gate
        working-directory: services/worker
        run: |
          uv run pytest \
            --cov=src/worker/bootstrap \
            --cov=src/worker/ingest \
            --cov=src/worker/data_quality \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70
      - name: Verify Bootstrap ETL fixture matches YAML source
        # Regenerate the fixture workbook to a temporary path and
        # semantic-diff every cell against the committed xlsx. This
        # catches the case where someone edits bootstrap_sample.yaml
        # but forgets to commit the rebuilt workbook. openpyxl's
        # xlsx output is not byte-stable across runs (zip entry
        # metadata drifts), so git diff is not a reliable check;
        # the loader-based cell-by-cell comparison is.
        working-directory: services/worker
        run: |
          mkdir -p "${RUNNER_TEMP}/fixture-check"
          REGEN_PATH="${RUNNER_TEMP}/fixture-check/bootstrap_sample.xlsx"
          uv run python ../../scripts/generate_bootstrap_fixture.py --output "$REGEN_PATH"
          uv run python -c "
          from openpyxl import load_workbook
          committed = load_workbook('tests/fixtures/bootstrap_sample.xlsx', data_only=True)
          regenerated = load_workbook('$REGEN_PATH', data_only=True)
          assert committed.sheetnames == regenerated.sheetnames, (
              f'sheet list drift: {committed.sheetnames} vs {regenerated.sheetnames}'
          )
          for sheet in committed.sheetnames:
              c_rows = [tuple(cell.value for cell in row) for row in committed[sheet].iter_rows()]
              r_rows = [tuple(cell.value for cell in row) for row in regenerated[sheet].iter_rows()]
              assert c_rows == r_rows, (
                  f'sheet {sheet!r} cell drift: committed vs regenerated differ. '
                  f'Edit services/worker/tests/fixtures/bootstrap_sample.yaml and '
                  f'rerun scripts/generate_bootstrap_fixture.py to commit the new xlsx.'
              )
          print('fixture drift check: OK')
          "
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: worker-coverage-xml
          path: services/worker/coverage.xml
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # llm-proxy-tests — PR #18 Group E
  #
  # Runs the first-ever llm-proxy test suite (201 tests: 171 unit +
  # 30 integration). Kept as a DEDICATED job (not folded into the
  # python-services matrix) for three reasons:
  #
  # 1. The ``python-services`` matrix job stays a cheap import smoke
  #    (uv sync + ``python -c "print('ok')"``, ~30s). That signal is
  #    valuable on its own — a broken dep tree or import graph turns
  #    it red before pytest ever has a chance to run. Keeping it
  #    separate means one job's dependency-drift failure does not
  #    mask the other's test-logic failure.
  # 2. Coverage gating (``--cov-fail-under``) only makes sense for
  #    the tests job, not the import smoke. Mixing them would either
  #    impose coverage on the smoke (meaningless) or skip coverage
  #    on the tests (defeats the point).
  # 3. Future matrix-additions to python-services (a new service
  #    with no tests yet, e.g. "scheduler" scaffold) would otherwise
  #    need an opt-out flag to skip the tests step. Dedicated job
  #    keeps the matrix row-shape uniform.
  #
  # NO redis service block. llm-proxy's test setup forces
  # ``APP_ENV=test`` (via conftest.py module-level setdefault +
  # belt-and-braces job env) which (a) pins slowapi storage to
  # ``memory://`` and (b) every cache test uses
  # ``fakeredis.aioredis.FakeRedis`` via dependency override. The
  # job is therefore self-contained and fast (~3s suite + sync).
  # -------------------------------------------------------------------------
  llm-proxy-tests:
    runs-on: ubuntu-latest
    env:
      # Pinned at the job level as belt-and-braces for the
      # conftest's ``os.environ.setdefault`` — if an inherited CI
      # env somehow set APP_ENV=prod, the module-level setdefault
      # in conftest.py would NOT override it and the eager
      # ``get_settings()`` in main.py would fail the import with
      # the prod-mock ValidationError (correct behavior, wrong
      # failure surface for a test run).
      APP_ENV: test
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Sync llm-proxy dev dependencies
        working-directory: services/llm-proxy
        # ``dev`` is declared under ``[project.optional-dependencies]``
        # in pyproject.toml, so ``--all-extras`` pulls pytest,
        # pytest-asyncio, pytest-cov, and fakeredis.
        run: uv sync --all-extras
      - name: Run pytest with coverage gate
        working-directory: services/llm-proxy
        run: |
          uv run pytest \
            --cov=src/llm_proxy \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: llm-proxy-coverage-xml
          path: services/llm-proxy/coverage.xml
          if-no-files-found: warn

  db-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: dprk_cti_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Install alembic deps from services/api
        run: uv sync --project services/api --no-install-project
      - name: Run alembic upgrade head
        env:
          ALEMBIC_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/dprk_cti_test
        run: uv run --project services/api alembic -c db/alembic.ini upgrade head
      - name: Verify pgvector and pg_trgm extensions
        run: |
          uv run --project services/api python -c "
          import psycopg
          c = psycopg.connect('postgresql://postgres:postgres@localhost:5432/dprk_cti_test')
          cur = c.cursor()
          cur.execute('SELECT extname FROM pg_extension WHERE extname IN (%s, %s) ORDER BY extname', ('pg_trgm', 'vector'))
          rows = cur.fetchall()
          assert rows == [('pg_trgm',), ('vector',)], f'Missing extensions: {rows}'
          print('extensions ok:', rows)
          "
      - name: Verify staging table exists
        run: |
          uv run --project services/api python -c "
          import psycopg
          c = psycopg.connect('postgresql://postgres:postgres@localhost:5432/dprk_cti_test')
          cur = c.cursor()
          cur.execute(\"SELECT table_name FROM information_schema.tables WHERE table_schema='public' AND table_name='staging'\")
          assert cur.fetchone() is not None, 'staging table missing'
          print('staging table ok')
          "
      - name: Verify dq_events table exists
        run: |
          uv run --project services/api python -c "
          import psycopg
          c = psycopg.connect('postgresql://postgres:postgres@localhost:5432/dprk_cti_test')
          cur = c.cursor()
          cur.execute(\"SELECT table_name FROM information_schema.tables WHERE table_schema='public' AND table_name='dq_events'\")
          assert cur.fetchone() is not None, 'dq_events table missing'
          cur.execute(\"SELECT conname FROM pg_constraint WHERE conrelid='dq_events'::regclass AND contype='c'\")
          check_names = {row[0] for row in cur.fetchall()}
          assert 'ck_dq_events_severity_allowed' in check_names, f'severity CHECK constraint missing: {check_names}'
          print('dq_events table ok')
          "
      - name: Verify downgrade/upgrade reversibility
        env:
          ALEMBIC_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/dprk_cti_test
        run: |
          uv run --project services/api alembic -c db/alembic.ini downgrade -1
          uv run --project services/api alembic -c db/alembic.ini upgrade head

  data-quality-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: dprk_cti_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/dprk_cti_test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Sync worker dev dependencies
        working-directory: services/worker
        run: uv sync
      - name: Sync api dependencies (for alembic)
        run: uv sync --project services/api --no-install-project
      - name: Run alembic upgrade head
        env:
          ALEMBIC_DATABASE_URL: ${{ env.DATABASE_URL }}
        run: uv run --project services/api alembic -c db/alembic.ini upgrade head
      - name: Generate happy-subset bootstrap fixture
        working-directory: services/worker
        run: |
          uv run python "${GITHUB_WORKSPACE}/scripts/generate_bootstrap_fixture.py" \
            --strip-failure-cases \
            --output "${RUNNER_TEMP}/bootstrap_happy.xlsx"
      - name: Seed fixture via bootstrap CLI
        working-directory: services/worker
        run: |
          uv run python -m worker.bootstrap \
            --workbook "${RUNNER_TEMP}/bootstrap_happy.xlsx" \
            --database-url "$DATABASE_URL" \
            --aliases-path "${GITHUB_WORKSPACE}/data/dictionaries/aliases.yml"
      - name: Run data quality gate with JSONL mirror
        working-directory: services/worker
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/artifacts"
          uv run python -m worker.data_quality check \
            --database-url "$DATABASE_URL" \
            --aliases-path "${GITHUB_WORKSPACE}/data/dictionaries/aliases.yml" \
            --fail-on error \
            --report-path "${GITHUB_WORKSPACE}/artifacts/dq_report.jsonl"
      - name: Upload dq_report.jsonl artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: dq-report-jsonl
          path: artifacts/dq_report.jsonl
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # contract-verify — PR #11 Phase 2.2 Group I
  #
  # Pact producer verification. Enumerates ``contracts/pacts/*.json`` and
  # runs ``pact-python``'s Verifier against the live API. Baseline posture:
  # no consumer contract file is committed yet (FE ships in PR #12), so
  # the harness skips-with-ok and this job is green. Once FE commits a
  # pact file, the harness flips to live verification automatically —
  # CI becomes a fail-fast guard on consumer contract drift without
  # requiring a workflow edit.
  #
  # Kept as a dedicated job (separate from api-tests) so the status
  # check surface is load-bearing: a reviewer can see at a glance
  # whether contract-verify is the signal to watch for FE↔BE drift.
  # -------------------------------------------------------------------------
  contract-verify:
    runs-on: ubuntu-latest
    # PR #12 Group I: flipped from skip-with-ok to live verify.
    # Boots real PG + Redis + uvicorn, exports PACT_PROVIDER_BASE_URL,
    # and runs pact-python's Verifier against the FE consumer pact at
    # contracts/pacts/frontend-dprk-cti-api.json. Provider states
    # resolve through the dev-only POST /_pact/provider_states
    # endpoint (registered under PACT_ROUTER_ENV_ALLOWLIST = {dev,test,
    # ci} in main.py; allowlist regression-guarded by
    # tests/contract/test_pact_states_prod_guard.py).
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: dprk_cti_pact
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ALEMBIC_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/dprk_cti_pact
      # Uvicorn consumes the async URL at runtime.
      DATABASE_URL: postgresql+psycopg_async://postgres:postgres@localhost:5432/dprk_cti_pact
      REDIS_URL: redis://localhost:6379/0
      RATE_LIMIT_STORAGE_URL: redis://localhost:6379/1
      # Pact verification seeds many reports without embeddings across
      # unrelated states before the populated /search interaction runs.
      # Keep the hybrid path reachable for that contract check even when
      # corpus-wide embedding coverage is low in the shared verifier DB.
      HYBRID_SEARCH_COVERAGE_THRESHOLD: "0.0"
      APP_ENV: dev
      OIDC_CLIENT_ID: dprk-cti
      OIDC_CLIENT_SECRET: pact-verify-oidc-secret
      OIDC_ISSUER_URL: http://keycloak.test/realms/dprk
      OIDC_REDIRECT_BASE_URL: http://localhost:8000
      SESSION_SIGNING_KEY: pact-verify-signing-key-at-least-32-chars
      SESSION_COOKIE_NAME: dprk_cti_session
      SESSION_COOKIE_SECURE: "false"
      SESSION_COOKIE_SAMESITE: lax
      CORS_ORIGINS: http://localhost:3000
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Sync api dev dependencies (includes pact-python)
        working-directory: services/api
        run: uv sync
      - name: Run alembic upgrade head
        run: uv run --project services/api alembic -c db/alembic.ini upgrade head
      - name: Boot uvicorn in the background
        working-directory: services/api
        run: |
          uv run uvicorn api.main:app --host 127.0.0.1 --port 8000 \
            --log-level warning > ../../uvicorn.log 2>&1 &
          echo $! > ../../uvicorn.pid
      - name: Wait for /healthz
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:8000/healthz >/dev/null 2>&1; then
              echo "uvicorn up"
              exit 0
            fi
            sleep 0.5
          done
          echo "uvicorn did not come up in 20s"
          cat uvicorn.log || true
          exit 1
      # pact-ruby does NOT forward cookies from the state-change
      # response to interaction requests. Auth must be a static
      # custom_provider_header. Mint the session once here (via the
      # same /_pact/provider_states endpoint the state setup uses —
      # drift-free with the handler) and export the Cookie value for
      # the verifier to inject.
      - name: Pre-mint session cookie for verifier headers
        run: |
          headers=$(curl -s -D - \
            -X POST http://127.0.0.1:8000/_pact/provider_states \
            -H 'Content-Type: application/json' \
            -d '{"state": "an authenticated analyst session"}')
          cookie=$(printf '%s\n' "$headers" \
            | grep -i '^set-cookie:' \
            | head -1 \
            | sed -E 's/^[Ss]et-[Cc]ookie: *[^=]+=([^;]+).*$/\1/')
          if [ -z "$cookie" ]; then
            echo "failed to mint session cookie"
            echo "--- response ---"
            echo "$headers"
            exit 1
          fi
          echo "PACT_SESSION_COOKIE=$cookie" >> "$GITHUB_ENV"
      - name: Run Pact producer verifier against live uvicorn
        working-directory: services/api
        env:
          PACT_PROVIDER_BASE_URL: http://127.0.0.1:8000
        run: uv run pytest tests/contract -v
      - name: Surface uvicorn log on failure
        if: failure()
        run: |
          echo "=== uvicorn.log ==="
          cat uvicorn.log || echo "(no log)"
      - name: Stop uvicorn
        if: always()
        run: |
          if [ -f uvicorn.pid ]; then
            kill "$(cat uvicorn.pid)" 2>/dev/null || true
          fi

  # -------------------------------------------------------------------------
  # api-integration — PR #10 Phase 2.1 Group H
  #
  # Real-PG acceptance for the promote / reject endpoint. Plan §5.2 locks
  # this as a REQUIRED status check: production write path is non-negotiable
  # and sqlite-memory unit tests cannot verify FOR UPDATE row-locking,
  # ON CONFLICT, SERIALIZABLE-ish single-winner, or JSONB round-trip.
  # -------------------------------------------------------------------------
  api-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: dprk_cti_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Sync URL for the alembic upgrade step.
      ALEMBIC_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/dprk_cti_test
      # Async URL for the pytest integration run — switches driver to psycopg_async.
      POSTGRES_TEST_URL: postgresql+psycopg_async://postgres:postgres@localhost:5432/dprk_cti_test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Sync api dev dependencies
        working-directory: services/api
        run: uv sync
      - name: Run alembic upgrade head
        run: uv run --project services/api alembic -c db/alembic.ini upgrade head
      - name: Run api integration tests (real-PG)
        working-directory: services/api
        run: uv run pytest tests/integration -m integration -v
      - name: Verify OpenAPI surface for review endpoints
        working-directory: services/api
        env:
          APP_ENV: dev  # openapi_url is None in prod; only dev exposes it
          DATABASE_URL: ${{ env.ALEMBIC_DATABASE_URL }}
          REDIS_URL: redis://localhost:6379/0
          OIDC_CLIENT_ID: dprk-cti
          OIDC_CLIENT_SECRET: ci-openapi-check
          OIDC_ISSUER_URL: http://keycloak.test/realms/dprk
          OIDC_REDIRECT_BASE_URL: http://localhost:8000
          SESSION_SIGNING_KEY: ci-openapi-check-signing-key-32chars
          SESSION_COOKIE_NAME: dprk_cti_session
          SESSION_COOKIE_SECURE: "false"
          SESSION_COOKIE_SAMESITE: lax
          CORS_ORIGINS: http://localhost:3000
        run: |
          uv run python -c "
          from api.main import app
          spec = app.openapi()
          paths = spec['paths']
          required = [
              '/api/v1/reports/review/{staging_id}',
              '/api/v1/staging/review',
              '/api/v1/staging/{staging_id}',
          ]
          for p in required:
              assert p in paths, f'missing path in OpenAPI: {p}'
          # review endpoint must declare the 3 error responses we ship.
          review_responses = paths['/api/v1/reports/review/{staging_id}']['post']['responses']
          for code in ('401', '403', '404', '409', '422'):
              assert code in review_responses, f'missing {code} response'
          print('openapi surface ok:', sorted(required))
          "

  # -------------------------------------------------------------------------
  # correlation-perf-smoke — PR-C T4 (plan `correlation-hardening.md` §4 T4)
  #
  # NFR-1 perf smoke: p95 ≤ 500 ms over 50 sequential GETs of the populated
  # /api/v1/analytics/correlation endpoint against host-hybrid uvicorn.
  #
  # Trigger: workflow_dispatch ONLY (manual). Per plan §C4 + §8 Q-C1 default,
  # this job is excluded from the default PR / push CI surface — perf budgets
  # measured on cold-start GitHub-hosted runners would flake (`pitfall_pact_v3
  # _ci_cold_start_race`); the value is in detecting genuine regressions on
  # demand, not on every push.
  #
  # Boot pattern mirrors `frontend-e2e` (postgres + redis + alembic + uvicorn
  # + healthcheck) but skips the FE preview side — the perf test calls
  # `/_pact/provider_states` directly to seed the populated fixture and mint
  # an analyst session cookie; no FE involvement.
  # -------------------------------------------------------------------------
  correlation-perf-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: dprk_cti_perf
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ALEMBIC_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/dprk_cti_perf
      DATABASE_URL: postgresql+psycopg_async://postgres:postgres@localhost:5432/dprk_cti_perf
      REDIS_URL: redis://localhost:6379/0
      RATE_LIMIT_STORAGE_URL: redis://localhost:6379/1
      APP_ENV: dev
      OIDC_CLIENT_ID: dprk-cti
      OIDC_CLIENT_SECRET: perf-smoke-oidc-secret
      OIDC_ISSUER_URL: http://keycloak.test/realms/dprk
      OIDC_REDIRECT_BASE_URL: http://localhost:8000
      SESSION_SIGNING_KEY: perf-smoke-signing-key-at-least-32-chars-long
      SESSION_COOKIE_NAME: dprk_cti_session
      SESSION_COOKIE_SECURE: "false"
      SESSION_COOKIE_SAMESITE: lax
      CORS_ORIGINS: http://127.0.0.1:4173
      PERF_TEST: "1"
      PERF_API_BASE_URL: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Sync api dev dependencies
        working-directory: services/api
        run: uv sync
      - name: Alembic upgrade
        run: uv run --project services/api alembic -c db/alembic.ini upgrade head
      - name: Start uvicorn
        working-directory: services/api
        run: |
          uv run uvicorn api.main:app --host 127.0.0.1 --port 8000 \
            --log-level warning > ../../uvicorn-perf.log 2>&1 &
          echo $! > ../../uvicorn-perf.pid
      - name: Wait for BE /healthz
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:8000/healthz >/dev/null 2>&1; then
              exit 0
            fi
            sleep 0.5
          done
          echo "uvicorn did not come up"
          cat uvicorn-perf.log || true
          exit 1
      - name: Run correlation perf smoke
        working-directory: services/api
        run: uv run pytest -m perf tests/perf -v
      - name: Surface server logs on failure
        if: failure()
        run: |
          echo "=== uvicorn-perf.log ==="
          cat uvicorn-perf.log || echo "(no log)"
      - name: Stop background processes
        if: always()
        run: |
          if [ -f uvicorn-perf.pid ]; then
            kill "$(cat uvicorn-perf.pid)" 2>/dev/null || true
          fi

  # -------------------------------------------------------------------------
  # dockerfile-digest-resolve — PR #49 (closes PR #48 security-reviewer R0 MED)
  #
  # The per-service `test_dockerfile_digest_pin.py` + FE
  # `dockerfile-digest-pin.test.ts` suites (added in PR #48) enforce the
  # FORMAT of every FROM line — they assert each carries `@sha256:<64-hex>`
  # but cannot validate that the digest actually exists in the upstream
  # registry. A contributor who typos a digest or copy-pastes from a
  # sibling image would pass the unit-test layer with a non-resolvable
  # reference. This job closes that gap.
  #
  # Walks every `Dockerfile` tracked by git, parses its `FROM` directives,
  # and runs `docker manifest inspect` against each fully-qualified
  # reference (image:tag@sha256:...). A typo'd digest fails with
  # "manifest unknown" / "no such manifest" — the job exits non-zero.
  #
  # The check is registry-roundtrip only (no `docker build`, no layer
  # download) so it stays fast (~5s) and adds no meaningful CI cost.
  # The `scratch` pseudo-image is excluded — it has no pullable manifest.
  # -------------------------------------------------------------------------
  dockerfile-digest-resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Resolve every pinned digest against its registry
        run: |
          set -euo pipefail
          FAIL=0
          # Walk every Dockerfile tracked by git so a future service Dockerfile
          # is picked up automatically without a workflow edit.
          while IFS= read -r dockerfile; do
            while IFS= read -r raw; do
              # Strip optional leading "--platform=..." flag(s) and trailing
              # "AS <stage>" suffix so what's left is the bare image ref.
              ref="$(printf '%s\n' "$raw" \
                | sed -E 's/^FROM[[:space:]]+//I' \
                | sed -E 's/^(--[^[:space:]]+[[:space:]]+)+//' \
                | sed -E 's/[[:space:]]+AS[[:space:]]+[A-Za-z0-9_-]+[[:space:]]*$//I' \
                | sed -E 's/[[:space:]]+$//')"
              if [ -z "$ref" ] || [ "$ref" = "scratch" ]; then
                continue
              fi
              echo ">>> $dockerfile: $ref"
              if ! docker manifest inspect "$ref" >/dev/null 2>&1; then
                echo "FAIL: docker manifest inspect rejected $ref"
                FAIL=1
              fi
            # `-i` matches the sed `/I` flags below so a lowercase `from`
            # line (legal per the Dockerfile spec) is not silently skipped.
            done < <(grep -iE '^[[:space:]]*FROM[[:space:]]' "$dockerfile")
          done < <(git ls-files -- '**/Dockerfile' 'Dockerfile')
          exit "$FAIL"
