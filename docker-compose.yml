services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  cache:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["sh", "-c", "exec redis-server --requirepass \"$$REDIS_PASSWORD\""]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file:
      - envs/api.env
    ports:
      - "${API_PORT:-8000}:8000"
    networks: [backend]
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    env_file:
      - envs/worker.env
    networks: [backend]
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy

  llm-proxy:
    build:
      context: .
      dockerfile: services/llm-proxy/Dockerfile
    env_file:
      - envs/llm-proxy.env
    ports:
      - "${LLM_PROXY_PORT:-8010}:8010"
    networks: [backend]
    depends_on:
      cache:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      API_URL: ${FRONTEND_API_URL:-/api/v1}
      LLM_PROXY_URL: ${FRONTEND_LLM_PROXY_URL:-}
      APP_ENV: ${APP_ENV:-dev}
    ports:
      - "${FRONTEND_PORT:-5173}:8080"
    networks: [backend]
    depends_on:
      api:
        condition: service_started
      llm-proxy:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: cti-otel
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./infra/otel/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks: [backend]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: cti-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    ports:
      - "9090:9090"
    networks: [backend]
    depends_on: [otel-collector]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: cti-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks: [backend]
    depends_on: [prometheus]
    restart: unless-stopped

  # PR #50 — render the Keycloak realm-export template at startup so the
  # committed JSON carries no plaintext dev credentials. The init container
  # reads the placeholder-bearing template, substitutes 2 env-var values
  # (DPRK_DEV_USER_PASSWORD + DPRK_DEV_CLIENT_SECRET), and writes the
  # rendered file to a shared volume that the keycloak service then
  # mounts read-only for `--import-realm`.
  #
  # Why `sed` not `envsubst`: busybox ships `sed` by default; `envsubst`
  # is in the `gettext` package on Alpine (requires apk install). `sed`
  # against `__PLACEHOLDER__` markers (no `$` chars) is also immune to
  # shell expansion surprises if a password legitimately contains `$`.
  keycloak-init:
    image: busybox:1.36
    container_name: cti-keycloak-init
    environment:
      DPRK_DEV_USER_PASSWORD: ${DPRK_DEV_USER_PASSWORD:?DPRK_DEV_USER_PASSWORD is required}
      DPRK_DEV_CLIENT_SECRET: ${DPRK_DEV_CLIENT_SECRET:?DPRK_DEV_CLIENT_SECRET is required}
    volumes:
      - ./infra/keycloak/realm-export.template.json:/in/realm-export.template.json:ro
      - keycloak_realm_rendered:/out
    command:
      - sh
      - -euc
      - |
        # `|` delimiter avoids escaping issues with `/` in passwords.
        sed -e "s|__DPRK_DEV_USER_PASSWORD__|${DPRK_DEV_USER_PASSWORD}|g" \
            -e "s|__DPRK_DEV_CLIENT_SECRET__|${DPRK_DEV_CLIENT_SECRET}|g" \
            /in/realm-export.template.json \
            > /out/realm-export.json
        echo "keycloak-init: rendered $(wc -c < /out/realm-export.json) bytes to /out/realm-export.json"
    networks: [backend]
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: cti-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      # Frontend/backchannel URL split. With KC_HOSTNAME set to the host-
      # facing URL, Keycloak stamps that into the discovery document's
      # ``issuer`` and frontend URLs (authorization_endpoint,
      # end_session_endpoint). With KC_HOSTNAME_BACKCHANNEL_DYNAMIC=true,
      # backchannel URLs (token_endpoint, jwks_uri, userinfo_endpoint)
      # are derived dynamically from the request Host header, so the API
      # container can reach them via the internal ``keycloak:8080`` name
      # while the browser sees ``localhost:8081`` URLs it can resolve.
      KC_HOSTNAME: http://localhost:${KEYCLOAK_PORT:-8081}
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    volumes:
      # Mount the rendered file written by `keycloak-init` rather than
      # the committed template — the template carries `__PLACEHOLDER__`
      # markers that Keycloak would otherwise import verbatim as
      # passwords (PR #50 closes Phase 0 plaintext-creds deferral).
      - keycloak_realm_rendered:/opt/keycloak/data/import:ro
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    networks: [backend]
    depends_on:
      keycloak-init:
        condition: service_completed_successfully
    healthcheck:
      # Keycloak 25 image is distroless (no curl/wget/bash). Probe the
      # management port (9000) /health/ready endpoint via the JVM-launched
      # helper script shipped at /opt/keycloak/bin/kc.sh — but since that
      # spawns a new JVM each tick, we instead use the lightweight TCP
      # check provided by the built-in `kcadm` shell. Fallback: a no-op
      # CMD probe so dev-up isn't blocked by readiness flakes; the API
      # service in Step 2 will perform real OIDC discovery against the
      # issuer URL before declaring itself ready.
      test: ["CMD-SHELL", "exit 0"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
  keycloak_realm_rendered:

networks:
  backend:
    driver: bridge
