      responses:
        "501":
          description: Not implemented (verify_token stub)
  /api/v1/alerts/{id}/ack:
    post:
      summary: Acknowledge an alert
      description: Currently returns 501 via verify_token stub; will return 200 once auth is implemented.
      operationId: alerts_ack
      tags: [alerts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "501":
          description: Not implemented (verify_token stub)
  /api/v1/alerts/rules:
    post:
      summary: Create an alert rule
      description: Currently returns 501 via verify_token stub; will return 200 once auth is implemented.
      operationId: alerts_rules_create
      tags: [alerts]
      responses:
        "501":
          description: Not implemented (verify_token stub)
  /api/v1/export/stix:
    get:
      summary: Export STIX 2.1 bundle
      description: Currently returns 501 via verify_token stub; will return 200 once auth is implemented.
      operationId: export_stix
      tags: [export]
      responses:
        "501":
          description: Not implemented (verify_token stub)
  /api/v1/export/pdf:
    get:
      summary: Export rendered PDF briefing
      description: Currently returns 501 via verify_token stub; will return 200 once auth is implemented.
      operationId: export_pdf
