# Source-of-truth for services/worker/tests/fixtures/bootstrap_sample.xlsx.
#
# Regenerate the xlsx with:
#     python scripts/generate_bootstrap_fixture.py
#
# Conventions:
#   - Keys prefixed with an underscore (_tag, _reason) are metadata for
#     reviewers and test harnesses. The generator writes only the
#     v1.0-schema columns to the workbook.
#   - `_tag` is one of:
#       happy         — row is valid input; the pipeline must accept it
#       failure_case  — row exercises a specific validation / normalization
#                       error path; the pipeline must reject it with the
#                       reason documented in `_reason`
#   - Failure rows are kept at a low enough ratio that the happy-fixture
#     run stays under the D5 5% fail-rate gate.
#
# Sheet column order matches the v1.0 workbook so the loader's column map
# in services/worker can match the fixture against real data.

