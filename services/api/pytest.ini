[pytest]
testpaths = tests
asyncio_mode = auto
addopts = -ra --strict-markers --strict-config
markers =
    integration: Real-PG integration test. Requires POSTGRES_TEST_URL env var
        plus an alembic-upgraded Postgres instance. Skipped automatically when
        POSTGRES_TEST_URL is unset, so default unit runs stay self-contained.
    perf: NFR-1 perf smoke. Requires PERF_TEST=1 env var plus a running
        uvicorn (default 127.0.0.1:8000) connected to an alembic-upgraded
        Postgres + Redis. Deselected automatically when PERF_TEST is unset,
        so default unit runs stay self-contained. See
        `services/api/tests/perf/conftest.py` for the gate.
filterwarnings =
    ignore::DeprecationWarning:authlib.*
    ignore::DeprecationWarning:fakeredis.*
