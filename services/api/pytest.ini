[pytest]
testpaths = tests
asyncio_mode = auto
addopts = -ra --strict-markers --strict-config
markers =
    integration: Real-PG integration test. Requires POSTGRES_TEST_URL env var
        plus an alembic-upgraded Postgres instance. Skipped automatically when
        POSTGRES_TEST_URL is unset, so default unit runs stay self-contained.
filterwarnings =
    ignore::DeprecationWarning:authlib.*
    ignore::DeprecationWarning:fakeredis.*
