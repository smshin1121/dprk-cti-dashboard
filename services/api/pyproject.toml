[project]
name = "dprk-cti-api"
version = "0.1.0"
description = "FastAPI scaffold for DPRK CTI platform"
requires-python = ">=3.12"
dependencies = [
  "alembic>=1.14.0",
  "authlib>=1.4.0",
  "fastapi>=0.115.0",
  "psycopg[binary]>=3.2.3",
  "pydantic-settings>=2.6.1",
  "sqlalchemy>=2.0.36",
  "uvicorn[standard]>=0.32.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/api"]

[tool.uv]
package = true
