server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Runtime-generated config must never be cached — it is rewritten at
    # container startup by /docker-entrypoint.sh from environment variables.
    location = /config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # SPA fallback — unknown routes go to the Vite-built index
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Lightweight liveness probe
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
